<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D&D Party — Level 1</title>
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    /* ── VARIABLES ── */
    :root {
      --bg:        #0d0b07;
      --parchment: #f5e6c8;
      --ink:       #1a1208;
      --gold:      #c9922a;
      --gold-lt:   #f0c060;
      --red:       #8b1a1a;
      --red-lt:    #d44040;
      --slate:     #2a2218;
      --slate-lt:  #3d3325;
      --muted:     #7a6a50;
      --border:    #4a3820;
      --glow:      rgba(201,146,42,.35);
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--parchment);
      font-family: 'Crimson Text', Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle parchment texture */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(90,55,10,.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(60,30,5,.22) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 3rem 1rem 1.5rem;
      position: relative; z-index: 1;
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 900;
      letter-spacing: .12em;
      color: var(--gold-lt);
      text-shadow: 0 0 30px var(--glow), 0 2px 0 #000;
      line-height: 1.1;
    }

    header p {
      margin-top: .6rem;
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-size: 1.15rem;
      color: var(--muted);
      letter-spacing: .06em;
    }

    .divider {
      width: 340px; max-width: 90%;
      height: 2px;
      margin: 1.2rem auto;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    /* ── PARTY TABLE ── */
    .party-section {
      position: relative; z-index: 1;
      max-width: 900px;
      margin: 0 auto 2.5rem;
      padding: 0 1.2rem;
    }

    .party-section h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      margin-bottom: 1.2rem;
    }

    .party-table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(20,15,5,.7);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,.6);
    }

    .party-table thead th {
      font-family: 'Cinzel', serif;
      font-size: .78rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(30,20,8,.9);
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    .party-table tbody tr {
      cursor: pointer;
      transition: background .2s, box-shadow .2s;
      border-bottom: 1px solid rgba(74,56,32,.4);
    }

    .party-table tbody tr:last-child { border-bottom: none; }

    .party-table tbody tr:hover,
    .party-table tbody tr.active {
      background: rgba(201,146,42,.12);
      box-shadow: inset 3px 0 0 var(--gold);
    }

    .party-table tbody td {
      padding: .75rem 1rem;
      font-size: 1.05rem;
      vertical-align: middle;
    }

    .td-name   { color: var(--parchment); font-weight: 600; font-size: 1.1rem; }
    .td-class  { color: var(--gold-lt); font-family: 'Cinzel', serif; font-size: .88rem; letter-spacing: .1em; }
    .td-race   { color: var(--muted); font-style: italic; }
    .td-gender { font-size: 1.2rem; }

    .class-badge {
      display: inline-block;
      padding: .15rem .55rem;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: rgba(201,146,42,.1);
      font-family: 'Cinzel', serif;
      font-size: .78rem;
      letter-spacing: .08em;
      color: var(--gold-lt);
    }

    /* ── CHARACTER SHEET ── */
    #sheet-area {
      position: relative; z-index: 1;
      max-width: 900px;
      margin: 0 auto 4rem;
      padding: 0 1.2rem;
    }

    .sheet {
      display: none;
      background: linear-gradient(160deg, #1a1308 0%, #120f06 100%);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2.2rem 2.5rem;
      box-shadow:
        0 0 60px rgba(0,0,0,.7),
        inset 0 0 80px rgba(201,146,42,.04);
      animation: sheetIn .4s ease;
    }

    .sheet.visible { display: block; }

    @keyframes sheetIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* sheet top */
    .sheet-header {
      display: flex;
      align-items: flex-start;
      gap: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
      margin-bottom: 1.8rem;
      flex-wrap: wrap;
    }

    .sheet-avatar {
      width: 90px; height: 90px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      box-shadow: 0 0 20px var(--glow);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      background: radial-gradient(circle at 40% 35%, #2d2010, #0d0b07);
      flex-shrink: 0;
    }

    .sheet-title h3 {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--gold-lt);
      text-shadow: 0 0 16px var(--glow);
    }

    .sheet-title .subtitle {
      color: var(--muted);
      font-style: italic;
      font-size: 1.05rem;
      margin-top: .25rem;
    }

    .sheet-meta {
      display: flex;
      gap: 1.5rem;
      margin-top: .7rem;
      flex-wrap: wrap;
    }

    .meta-chip {
      font-family: 'Cinzel', serif;
      font-size: .78rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(201,146,42,.1);
      border: 1px solid var(--border);
      padding: .2rem .65rem;
      border-radius: 3px;
    }

    /* ── STATS GRID ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.8rem;
    }

    @media (max-width: 560px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }

    .stat-block {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .9rem .8rem;
      text-align: center;
    }

    .stat-label {
      font-family: 'Cinzel', serif;
      font-size: .65rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .3rem;
    }

    .stat-score {
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold-lt);
      line-height: 1;
    }

    .stat-mod {
      font-size: .85rem;
      color: var(--muted);
      margin-top: .15rem;
    }

    /* ── SECTION BLOCKS ── */
    .section {
      margin-bottom: 1.6rem;
    }

    .section-title {
      font-family: 'Cinzel', serif;
      font-size: .78rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--gold);
      border-bottom: 1px solid var(--border);
      padding-bottom: .4rem;
      margin-bottom: .9rem;
    }

    /* HP / AC / Speed row */
    .vitals {
      display: flex;
      gap: 1.4rem;
      flex-wrap: wrap;
      margin-bottom: 1.6rem;
    }

    .vital {
      background: rgba(139,26,26,.18);
      border: 1px solid rgba(139,26,26,.5);
      border-radius: 6px;
      padding: .6rem 1.2rem;
      text-align: center;
    }

    .vital.blue {
      background: rgba(26,50,139,.18);
      border-color: rgba(60,100,200,.45);
    }

    .vital.green {
      background: rgba(20,90,30,.18);
      border-color: rgba(50,140,60,.45);
    }

    .vital-label {
      font-family: 'Cinzel', serif;
      font-size: .63rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .vital-val {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--parchment);
    }

    /* Attacks */
    .attacks-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .95rem;
    }

    .attacks-table th {
      font-family: 'Cinzel', serif;
      font-size: .65rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: .35rem .6rem;
      border-bottom: 1px solid var(--border);
    }

    .attacks-table td {
      padding: .45rem .6rem;
      border-bottom: 1px solid rgba(74,56,32,.25);
      vertical-align: middle;
    }

    .attacks-table tr:last-child td { border-bottom: none; }

    .atk-name  { color: var(--parchment); font-weight: 600; }
    .atk-bonus { color: var(--gold-lt); font-family: monospace; font-size: 1rem; }
    .atk-dmg   { color: var(--red-lt);  font-family: monospace; font-size: .95rem; }
    .atk-type  { color: var(--muted);   font-style: italic; }

    /* Skills */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: .35rem;
    }

    .skill-row {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .95rem;
    }

    .skill-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      border: 1px solid var(--muted);
      flex-shrink: 0;
    }

    .skill-dot.prof {
      background: var(--gold);
      border-color: var(--gold);
    }

    .skill-name { color: var(--muted); }
    .skill-val  { margin-left: auto; color: var(--parchment); font-family: monospace; min-width: 28px; text-align: right; }

    /* Backstory */
    .backstory {
      font-size: 1.05rem;
      line-height: 1.75;
      color: #c8b89a;
      font-style: italic;
      border-left: 3px solid var(--gold);
      padding-left: 1.1rem;
    }

    /* Traits */
    .traits-list { list-style: none; }
    .traits-list li {
      padding: .3rem 0;
      border-bottom: 1px solid rgba(74,56,32,.2);
      font-size: .98rem;
      color: #c8b89a;
    }
    .traits-list li:last-child { border-bottom: none; }
    .traits-list strong { color: var(--gold-lt); }

    /* placeholder */
    .sheet-placeholder {
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--muted);
      font-style: italic;
      font-size: 1.1rem;
      border: 1px dashed var(--border);
      border-radius: 10px;
    }

    .sheet-placeholder span { font-size: 2.5rem; display: block; margin-bottom: 1rem; opacity: .5; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <p>✦ Dungeons &amp; Dragons · Level 1 ✦</p>

/* ════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════ */
function mod(score) {
  const m = Math.floor((score - 10) / 2);
  return (m >= 0 ? '+' : '') + m;
}

function allSkills() {
  return [
    ['Acrobatics','DEX'],['Animal Handling','WIS'],['Arcana','INT'],
    ['Athletics','STR'],['Deception','CHA'],['History','INT'],
    ['Insight','WIS'],['Intimidation','CHA'],['Investigation','INT'],
    ['Medicine','WIS'],['Nature','INT'],['Perception','WIS'],
    ['Performance','CHA'],['Persuasion','CHA'],['Religion','INT'],
    ['Sleight of Hand','DEX'],['Stealth','DEX'],['Survival','WIS'],
  ];
}

function skillVal(c, skillName, ability) {
  const base = Math.floor((c.stats[ability] - 10) / 2);
  const isProficient = c.proficient.some(p => p.toLowerCase() === skillName.toLowerCase());
  const total = base + (isProficient ? c.prof : 0);
  return { val: (total >= 0 ? '+' : '') + total, prof: isProficient };
}

/* ════════════════════════════════════════════
   BUILD PARTY TABLE
════════════════════════════════════════════ */
const tbody = document.getElementById('party-body');
CHARACTERS.forEach((c, i) => {
  const tr = document.createElement('tr');
  tr.dataset.id = c.id;
  tr.innerHTML = `
    <td style="color:var(--muted);font-family:'Cinzel',serif;font-size:.8rem">${i+1}</td>
    <td class="td-name">${c.emoji} ${c.name}</td>
    <td><span class="class-badge">${c.class}</span></td>
    <td class="td-race">${c.race}</td>
    <td class="td-race">${c.background}</td>
    <td class="td-gender">${c.gender}</td>
  `;
  tr.addEventListener('click', () => showSheet(c.id));
  tbody.appendChild(tr);
});

/* ════════════════════════════════════════════
   BUILD CHARACTER SHEET
════════════════════════════════════════════ */
function showSheet(id) {
  const c = CHARACTERS.find(x => x.id === id);
  if (!c) return;

  /* highlight row */
  document.querySelectorAll('#party-body tr').forEach(tr => {
    tr.classList.toggle('active', tr.dataset.id === id);
  });

  /* hide placeholder */
  document.getElementById('placeholder').style.display = 'none';

  /* build attacks rows */
  const atkRows = c.attacks.map(a => `
    <tr>
      <td class="atk-name">${a.name}</td>
      <td class="atk-bonus">${a.bonus}</td>
      <td class="atk-dmg">${a.damage}</td>
      <td class="atk-type">${a.type}</td>
    </tr>
  `).join('');

  /* build skills */
  const skillRows = allSkills().map(([name, ability]) => {
    const {val, prof} = skillVal(c, name, ability);
    return `
      <div class="skill-row">
        <div class="skill-dot ${prof ? 'prof' : ''}"></div>
        <span class="skill-name">${name}</span>
        <span class="skill-val">${val}</span>
      </div>`;
  }).join('');

  /* build traits */
  const traitItems = c.traits.map(t =>
    `<li><strong>${t.name}:</strong> ${t.desc}</li>`
  ).join('');

  /* stats */
  const statsHTML = Object.entries(c.stats).map(([attr, val]) => `
    <div class="stat-block">
      <div class="stat-label">${attr}</div>
      <div class="stat-score">${val}</div>
      <div class="stat-mod">${mod(val)}</div>
    </div>
  `).join('');

  /* compose sheet */
  document.getElementById('sheet-container').innerHTML = `
    <div class="sheet visible">

      <!-- HEADER -->
      <div class="sheet-header">
        <div class="sheet-avatar">${c.emoji}</div>
        <div class="sheet-title">
          <h3>${c.name}</h3>
          <div class="subtitle">${c.subclass}</div>
          <div class="sheet-meta">
            <span class="meta-chip">${c.class} 1</span>
            <span class="meta-chip">${c.race}</span>
            <span class="meta-chip">${c.background}</span>
            <span class="meta-chip">${c.alignment}</span>
            <span class="meta-chip">Prof +${c.prof}</span>
          </div>
        </div>
      </div>

      <!-- VITALS -->
      <div class="vitals">
        <div class="vital">
          <div class="vital-label">Max HP</div>
          <div class="vital-val">${c.hp}</div>
        </div>
        <div class="vital blue">
          <div class="vital-label">Armor Class</div>
          <div class="vital-val">${c.ac}</div>
        </div>
        <div class="vital green">
          <div class="vital-label">Speed</div>
          <div class="vital-val">${c.speed} ft</div>
        </div>
        <div class="vital blue">
          <div class="vital-label">Initiative</div>
          <div class="vital-val">${mod(c.stats.DEX)}</div>
        </div>
        <div class="vital">
          <div class="vital-label">Passive Perc.</div>
          <div class="vital-val">${10 + Math.floor((c.stats.WIS-10)/2) + (c.proficient.some(p=>p==='Perception') ? c.prof : 0)}</div>
        </div>
      </div>

      <!-- ABILITY SCORES -->
      <div class="section">
        <div class="section-title">Ability Scores</div>
        <div class="stats-grid">${statsHTML}</div>
      </div>

      <!-- ATTACKS -->
      <div class="section">
        <div class="section-title">Attacks &amp; Spellcasting</div>
        <table class="attacks-table">
          <thead>
            <tr>
              <th>Name</th><th>Attack Bonus</th><th>Damage / Effect</th><th>Type</th>
            </tr>
          </thead>
          <tbody>${atkRows}</tbody>
        </table>
      </div>

      <!-- SKILLS + TRAITS side by side -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;flex-wrap:wrap;" class="two-col">
        <div class="section">
          <div class="section-title">Skills</div>
          <div class="skills-grid">${skillRows}</div>
        </div>
        <div class="section">
          <div class="section-title">Class Traits &amp; Features</div>
          <ul class="traits-list">${traitItems}</ul>
        </div>
      </div>

      <!-- BACKSTORY -->
      <div class="section" style="margin-top:1.6rem">
        <div class="section-title">Backstory</div>
        <p class="backstory">${c.backstory}</p>
      </div>

    </div>
  `;

  /* scroll to sheet */
  document.getElementById('sheet-area').scrollIntoView({ behavior:'smooth', block:'start' });
}

/* responsive two-col */
const style = document.createElement('style');
style.textContent = '@media(max-width:600px){.two-col{grid-template-columns:1fr!important}}';
document.head.appendChild(style);
</script>
</body>
</html>
